name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use standalone package.json for CI
        run: |
          cp package.ci.json package.json
          rm -f pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web app
        run: pnpm exec vite build --config vite.ci.config.ts
        env:
          BASE_PATH: /

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android build tools
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Capacitor init & sync
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Force landscape orientation (patch AndroidManifest)
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if grep -q 'screenOrientation' "$MANIFEST"; then
            sed -i 's/android:screenOrientation="[^"]*"/android:screenOrientation="sensorLandscape"/' "$MANIFEST"
          else
            sed -i 's/<activity /<activity android:screenOrientation="sensorLandscape" /' "$MANIFEST"
          fi
          echo "=== Manifest activity block ===" && grep -A 3 '<activity' "$MANIFEST"

      - name: Setup keystore for signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/forge-frenzy.jks
          echo "✓ Keystore decoded: $(stat -c%s android/app/forge-frenzy.jks) bytes"

      - name: Patch build.gradle with signing config
        run: |
          python3 - android/app/build.gradle << 'PYEOF'
import sys, re

path = sys.argv[1]
with open(path) as f:
    content = f.read()

signing_block = """
    signingConfigs {
        release {
            storeFile file("forge-frenzy.jks")
            storePassword System.getenv("KEYSTORE_PASSWORD")
            keyAlias System.getenv("KEY_ALIAS")
            keyPassword System.getenv("KEY_PASSWORD")
        }
    }
"""

# Sisipkan signingConfigs setelah "android {" pertama
content = re.sub(r'(android \{)', r'\1' + signing_block, content, count=1)

# Tambahkan signingConfig ke dalam release buildType
content = re.sub(
    r'(release \s*\{)',
    r'\1\n            signingConfig signingConfigs.release',
    content, count=1, flags=re.DOTALL
)

with open(path, 'w') as f:
    f.write(content)
print("✓ build.gradle patched with signing config")
PYEOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build signed release APK
        run: ./gradlew assembleRelease --no-daemon
        working-directory: android
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Locate release APK
        run: |
          find android/app/build/outputs/apk -name "*.apk" -ls

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-frenzy-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload APK to release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          name: Forge Frenzy ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
